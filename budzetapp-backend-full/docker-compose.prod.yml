version: "3.9"

# ============================================================
#  PRODUCTION — docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#  Nadpisuje ustawienia dev: brak portów na zewnątrz, Gunicorn, bez hot-reload
# ============================================================

services:

  db:
    restart: always
    ports: []            # Brak ekspozycji portu 5432 na zewnątrz
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    restart: always
    ports: []            # Brak ekspozycji portu 6379 na zewnątrz
    deploy:
      resources:
        limits:
          memory: 128M

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production  # Multi-stage build — pełny obraz prod
    restart: always
    environment:
      FLASK_ENV:    production
      FLASK_DEBUG:  "0"
      WORKERS:      ${GUNICORN_WORKERS:-4}
      THREADS:      ${GUNICORN_THREADS:-2}
      FRONTEND_URL: https://${DOMAIN}
    volumes: []          # Brak mount kodu w produkcji — kod jest w obrazie
    ports: []            # Tylko wewnętrzna komunikacja przez nginx
    deploy:
      resources:
        limits:
          memory: 512M
      restart_policy:
        condition: on-failure
        max_attempts: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    restart: always
    volumes: []
    ports: []
    deploy:
      resources:
        limits:
          memory: 64M

  nginx:
    volumes:
      - ./nginx/conf.d/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    restart: always
    deploy:
      resources:
        limits:
          memory: 64M

  # ----------------------------------------------------------
  #  Cloudflare Tunnel — zamiast otwierania portu 443
  #  Tunel sam obsługuje SSL, Nginx słucha tylko na 80
  # ----------------------------------------------------------
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: budzetapp_cloudflared
    restart: always
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - nginx
    networks:
      - frontend_net
    deploy:
      resources:
        limits:
          memory: 64M
