name: CI — testy i lint

# Uruchamia się na każdy push i pull request do main i dev
on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  test:
    name: Pytest + Flake8
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # Uruchom PostgreSQL i Redis jako serwisy obok kontenera testowego
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB:       budzetapp_test
          POSTGRES_USER:     test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Cache zależności Pythona — przyspiesza kolejne uruchomienia
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: pip-

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalacja zależności
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint — Flake8
        run: |
          pip install flake8
          flake8 app/ --max-line-length=100 --exclude=migrations/ \
            --per-file-ignores="app/models/*:E501"

      - name: Testy — Pytest
        env:
          FLASK_ENV:         testing
          DATABASE_URL:      postgresql://test_user:test_password@localhost:5432/budzetapp_test
          REDIS_URL:         redis://localhost:6379/1
          SECRET_KEY:        ci-test-secret-key-not-for-production
          JWT_SECRET_KEY:    ci-test-jwt-key-not-for-production
          POSTGRES_PASSWORD: test_password
        run: |
          flask db upgrade
          pytest tests/ -v --tb=short --cov=app --cov-report=xml

      - name: Upload coverage do Codecov (opcjonalnie)
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: backend/coverage.xml
          fail_ci_if_error: false
