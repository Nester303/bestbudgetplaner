name: CD — deploy na produkcję

# Uruchamia się TYLKO po udanym merge do main
on:
  push:
    branches: [main]
  # Możesz też triggerować ręcznie z GitHub UI
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Pomiń testy (tylko w nagłych przypadkach)'
        required: false
        default: 'false'
        type: boolean

# Jeden deploy na raz — jeśli trwa, anuluj poprzedni
concurrency:
  group: production-deploy
  cancel-in-progress: false   # false = czekaj na koniec, nie anuluj

jobs:
  # ----------------------------------------------------------
  # 1. Testy — muszą przejść przed deployem
  # ----------------------------------------------------------
  test:
    name: Weryfikacja przed deployem
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.skip_tests != 'true' }}

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB:       budzetapp_test
          POSTGRES_USER:     test_user
          POSTGRES_PASSWORD: test_password
        ports: [5432:5432]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: [6379:6379]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('backend/requirements.txt') }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Testy
        env:
          FLASK_ENV:      testing
          DATABASE_URL:   postgresql://test_user:test_password@localhost:5432/budzetapp_test
          REDIS_URL:      redis://localhost:6379/1
          SECRET_KEY:     ci-test-secret
          JWT_SECRET_KEY: ci-test-jwt
          POSTGRES_PASSWORD: test_password
        run: |
          flask db upgrade
          pytest tests/ -x --tb=short

  # ----------------------------------------------------------
  # 2. Deploy — przez Tailscale SSH
  # ----------------------------------------------------------
  deploy:
    name: Deploy → serwer produkcyjny
    runs-on: ubuntu-latest
    needs: [test]
    # Uruchom nawet jeśli test job był pominięty (skip_tests=true)
    if: always() && (needs.test.result == 'success' || needs.test.result == 'skipped')
    environment:
      name: production
      url: https://${{ secrets.DOMAIN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ----------------------------------------------------------
      # Tailscale — runner dołącza do Twojej sieci VPN
      # Bez tego nie ma dostępu do serwera po SSH
      # ----------------------------------------------------------
      - name: Dołącz do Tailscale VPN
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          # Ephemeral key — runner zniknie z listy urządzeń po jobie
          args: --ephemeral --accept-routes

      # ----------------------------------------------------------
      # SSH — załaduj klucz prywatny i dodaj serwer do known_hosts
      # ----------------------------------------------------------
      - name: Skonfiguruj SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          # Klucz prywatny z GitHub Secret
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          # Dodaj Tailscale IP serwera do known_hosts (bez pytania o fingerprint)
          ssh-keyscan -H ${{ secrets.SERVER_TAILSCALE_IP }} >> ~/.ssh/known_hosts 2>/dev/null

          # Konfiguracja SSH dla deployu
          cat >> ~/.ssh/config <<EOF
          Host deploy-server
            HostName ${{ secrets.SERVER_TAILSCALE_IP }}
            User ${{ secrets.SERVER_USER }}
            IdentityFile ~/.ssh/deploy_key
            IdentitiesOnly yes
            StrictHostKeyChecking yes
            ConnectTimeout 30
          EOF

      # ----------------------------------------------------------
      # Deploy właściwy — wszystko przez jeden blok SSH
      # ----------------------------------------------------------
      - name: Deploy na serwer
        run: |
          ssh deploy-server << 'ENDSSH'
            set -euo pipefail
            export PATH=$PATH:/usr/local/bin

            echo "=== [$(date)] Deploy rozpoczęty ==="
            cd /opt/budzetapp

            # Backup aktualnej wersji (szybki rollback)
            echo "--- Backup bieżącej wersji ---"
            git stash 2>/dev/null || true
            PREV_COMMIT=$(git rev-parse --short HEAD)
            echo "Poprzedni commit: $PREV_COMMIT"

            # Pobierz nowy kod
            echo "--- git pull ---"
            git pull origin main

            NEW_COMMIT=$(git rev-parse --short HEAD)
            echo "Nowy commit: $NEW_COMMIT"

            # Zbuduj i uruchom
            echo "--- docker compose build ---"
            docker compose -f docker-compose.yml -f docker-compose.prod.yml \
              build --no-cache backend frontend

            echo "--- Migracje bazy ---"
            docker compose -f docker-compose.yml -f docker-compose.prod.yml \
              run --rm backend flask db upgrade

            echo "--- Restart usług ---"
            docker compose -f docker-compose.yml -f docker-compose.prod.yml \
              up -d --remove-orphans

            # Poczekaj na start
            sleep 8

            # Health check
            echo "--- Health check ---"
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" http://localhost/api/health)
            if [ "$HTTP" = "200" ]; then
              echo "✓ Health check OK"
            else
              echo "✗ Health check FAIL (HTTP $HTTP) — rollback!"
              git checkout $PREV_COMMIT
              docker compose -f docker-compose.yml -f docker-compose.prod.yml \
                up -d --remove-orphans
              exit 1
            fi

            echo "=== Deploy zakończony: $PREV_COMMIT → $NEW_COMMIT ==="
          ENDSSH

      # ----------------------------------------------------------
      # Powiadomienie — status deployu
      # ----------------------------------------------------------
      - name: Powiadomienie o sukcesie
        if: success()
        run: |
          echo "✅ Deploy na produkcję zakończony sukcesem!"
          echo "Commit: ${{ github.sha }}"
          echo "Autor: ${{ github.actor }}"

      - name: Powiadomienie o błędzie
        if: failure()
        run: |
          echo "❌ Deploy NIEUDANY — sprawdź logi powyżej"
          echo "Commit: ${{ github.sha }}"

      # Opcjonalnie: powiadomienie na Slack/email
      # - name: Slack notification
      #   uses: rtCamp/action-slack-notify@v2
      #   env:
      #     SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
      #     SLACK_MESSAGE: "Deploy ${{ job.status }} — ${{ github.sha }}"
