# ============================================================
#  NGINX — konfiguracja PRODUCTION
#  Cloudflare Tunnel trafia na port 80 (SSL obsługuje Cloudflare)
#  Nginx serwuje statykę bezpośrednio, /api/ → Gunicorn
# ============================================================

upstream backend_prod {
    server backend:5000;
    keepalive 64;
}

server {
    listen 80;
    server_name _;

    add_header X-Frame-Options          "SAMEORIGIN"  always;
    add_header X-Content-Type-Options   "nosniff"     always;
    add_header X-XSS-Protection         "1; mode=block" always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;

    # Pliki statyczne frontendowe
    location / {
        root  /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # Zasoby statyczne z cache
    location ~* \.(js|css|woff2|woff|ttf|png|jpg|jpeg|svg|ico|webp)$ {
        root      /usr/share/nginx/html;
        expires   1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # API backend
    location /api/ {
        proxy_pass         http://backend_prod;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_connect_timeout  10s;
        proxy_read_timeout     120s;
        proxy_send_timeout     120s;
        proxy_buffering off;
    }

    location /nginx-health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location ~ /\. {
        deny all;
        return 404;
    }

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/html text/css application/javascript application/json image/svg+xml font/woff2;

    access_log /dev/stdout;
    error_log  /dev/stderr warn;
}
