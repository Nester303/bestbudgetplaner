# ============================================================
#  pytest.ini — konfiguracja testów
# ============================================================
[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Logi podczas testów
log_cli = true
log_cli_level = WARNING

# Markery
markers =
    slow: testy wolne (pomiń z -m "not slow")
    integration: testy integracyjne z bazą
