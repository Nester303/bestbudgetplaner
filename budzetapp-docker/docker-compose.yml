version: "3.9"

# ============================================================
#  DEVELOPMENT — docker compose up
#  Hot-reload backendu, baza na hoście, logi verbose
# ============================================================

services:

  # ----------------------------------------------------------
  #  PostgreSQL
  # ----------------------------------------------------------
  db:
    image: postgres:16-alpine
    container_name: budzetapp_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-budzetapp_db}
      POSTGRES_USER:     ${POSTGRES_USER:-budzetapp_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA:            /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./deploy/db/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    ports:
      # Dostęp z hosta (dev tools, DBeaver itp.) — w prod zakomentuj
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-budzetapp_user} -d ${POSTGRES_DB:-budzetapp_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - backend_net

  # ----------------------------------------------------------
  #  Redis — sesje, cache, rate limiting
  # ----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: budzetapp_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend_net

  # ----------------------------------------------------------
  #  Backend — Flask (dev: hot reload przez watchdog)
  # ----------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: budzetapp_backend
    restart: unless-stopped
    environment:
      FLASK_ENV:         development
      FLASK_DEBUG:       "1"
      DATABASE_URL:      postgresql://${POSTGRES_USER:-budzetapp_user}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-budzetapp_db}
      REDIS_URL:         redis://:${REDIS_PASSWORD}@redis:6379/0
      SECRET_KEY:        ${SECRET_KEY}
      JWT_SECRET_KEY:    ${JWT_SECRET_KEY}
      MAIL_SERVER:       ${MAIL_SERVER:-}
      MAIL_USERNAME:     ${MAIL_USERNAME:-}
      MAIL_PASSWORD:     ${MAIL_PASSWORD:-}
      MAIL_DEFAULT_SENDER: ${MAIL_DEFAULT_SENDER:-noreply@localhost}
      FRONTEND_URL:      http://localhost:3000
    volumes:
      # Hot-reload — montuj cały kod backendu
      - ./backend:/app
      # Osobny volume na cache Pythona żeby nie zaśmiecać źródeł
      - backend_cache:/app/__pycache__
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend_net
      - frontend_net

  # ----------------------------------------------------------
  #  Frontend — statyczne pliki przez prosty serwer dev
  # ----------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: budzetapp_frontend
    restart: unless-stopped
    volumes:
      - ./frontend/src:/usr/share/nginx/html:ro
    ports:
      - "3000:80"
    networks:
      - frontend_net

  # ----------------------------------------------------------
  #  Nginx — reverse proxy (dev: łączy frontend + API)
  # ----------------------------------------------------------
  nginx:
    image: nginx:1.25-alpine
    container_name: budzetapp_nginx
    restart: unless-stopped
    volumes:
      - ./nginx/conf.d/dev.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend
    networks:
      - frontend_net
      - backend_net

# ----------------------------------------------------------
#  Volumes
# ----------------------------------------------------------
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  backend_cache:
    driver: local

# ----------------------------------------------------------
#  Networks
# ----------------------------------------------------------
networks:
  backend_net:
    driver: bridge
  frontend_net:
    driver: bridge
