server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — każdy nieznany URL → index.html (router JS obsługuje)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Wyłącz cache w dev — przeglądarka zawsze pobiera świeże pliki
    add_header Cache-Control "no-store, no-cache, must-revalidate";
    add_header Pragma "no-cache";

    # Logi na stdout/stderr (Docker zbiera automatycznie)
    access_log /dev/stdout;
    error_log  /dev/stderr warn;
}
